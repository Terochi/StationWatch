<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6 font-sans">

    <header class="mb-8 border-b border-slate-800 pb-4 flex justify-between items-end">
        <div>
            <h1 class="text-2xl font-bold tracking-tight text-white">Hardware Command Center</h1>
            <p class="text-sm text-slate-400">Hierarchical real-time device mapping matrix</p>
        </div>
        <div class="flex flex-col items-end gap-2">
            <div id="connection-status" class="flex items-center gap-2 bg-rose-500/10 text-rose-400 px-3 py-1 rounded-full text-xs font-medium border border-rose-500/20">
                <span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span> Offline
            </div>
            <div class="flex gap-2">
                <button onclick="toggleIgnoredModal()" class="text-xs bg-slate-800 hover:bg-slate-700 text-white font-semibold py-1.5 px-4 rounded-md border border-slate-700 transition-colors cursor-pointer shadow-sm">
                    👁️ Ignored Devices
                </button>
                <button onclick="toggleTeamModal()" class="text-xs bg-slate-800 hover:bg-slate-700 text-white font-semibold py-1.5 px-4 rounded-md border border-slate-700 transition-colors cursor-pointer shadow-sm">
                    👥 Manage Team
                </button>
            </div>
        </div>
    </header>

    <div id="ignored-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-xl w-full max-w-xl shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-white">Ignored Hardware</h2>
                <button onclick="toggleIgnoredModal()" class="text-slate-400 hover:text-white cursor-pointer font-bold">✕</button>
            </div>
            <p class="text-xs text-slate-400 mb-4">These devices are hidden from the main dashboard and will not trigger Ntfy alerts.</p>
            <div id="ignored-list" class="space-y-2 max-h-80 overflow-y-auto pr-1"></div>
        </div>
    </div>

    <div id="team-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-xl w-full max-w-md shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-white">Manage Owners</h2>
                <button onclick="toggleTeamModal()" class="text-slate-400 hover:text-white cursor-pointer font-bold">✕</button>
            </div>
            <div class="flex gap-2 mb-4">
                <input type="text" id="new-owner-name" placeholder="New Person's Name" class="flex-1 bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm focus:border-amber-500 focus:outline-none text-slate-200">
                <button onclick="addOwner()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-4 py-2 rounded-lg text-sm cursor-pointer transition-colors">Add</button>
            </div>
            <div id="owners-list" class="space-y-2 max-h-60 overflow-y-auto pr-1"></div>
        </div>
    </div>

    <div id="confirm-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center">
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-xl w-full max-w-sm shadow-2xl">
            <h3 id="confirm-title" class="text-base font-bold text-white mb-2">Are you sure?</h3>
            <p id="confirm-message" class="text-xs text-slate-400 mb-6"></p>
            <div class="flex justify-end gap-3">
                <button onclick="hideConfirm()" class="text-xs bg-slate-800 hover:bg-slate-700 text-white font-semibold py-1.5 px-4 rounded-md border border-slate-700 cursor-pointer transition-colors">Cancel</button>
                <button id="confirm-action-btn" class="text-xs bg-rose-600 hover:bg-rose-500 text-white font-bold py-1.5 px-4 rounded-md cursor-pointer transition-colors">Delete</button>
            </div>
        </div>
    </div>

    <main>
        <div id="pcs-container" class="grid grid-cols-1 xl:grid-cols-2 gap-6"></div>
    </main>

    <script>
        const API_BASE = `${document.location.origin}`;
        const WS_URL = `ws://${document.location.host}/ws/dashboard`;
        let socket;
        
        let hardwareStateCache = {}; 
        let headerStateCache = {};

        let editingDevices = {}; 
        let editingPCs = {};
        let teamOwners = [];
        let allDevicesCache = [];

        const CATEGORIES = ["Mouse", "Keyboard", "Monitor", "Controller", "Headphones", "Speakers", "Other"];
        const getEmoji = (cat) => {
            const map = { "Mouse": "🖱️", "Keyboard": "⌨️", "Monitor": "🖥️", "Controller": "🎮", "Headphones": "🎧", "Speakers": "🔊" };
            return map[cat] || "🔌";
        };

        function esc(prefix, rawId) {
            try {
                const b64 = btoa(unescape(encodeURIComponent(rawId)))
                    .replace(/=/g, '')
                    .replace(/\+/g, '_')
                    .replace(/\//g, '-');
                return `${prefix}_${b64}`;
            } catch (e) {
                return `${prefix}_${rawId.replace(/[^a-zA-Z0-9]/g, '_')}`;
            }
        }

        const buildOwnerSelect = (id, currentOwner, type) => `
            <select id="${esc(type + '-owner', id)}" class="flex-1 text-xs bg-slate-950 border border-slate-700 rounded-lg p-2 focus:border-amber-500 focus:outline-none text-slate-200">
                <option value="">Unassigned</option>
                ${teamOwners.map(o => `<option value="${o.name}" ${currentOwner === o.name ? 'selected' : ''}>${o.name}</option>`).join('')}
            </select>
        `;

        function extractExeName(path) {
            if (!path) return "Unknown Application";
            return path.split('\\').pop().split('/').pop();
        }

        function showConfirm(title, message, callback, actionLabel = "Delete") {
            document.getElementById("confirm-title").innerText = title;
            document.getElementById("confirm-message").innerText = message;
            
            const actionBtn = document.getElementById("confirm-action-btn");
            actionBtn.innerText = actionLabel;
            actionBtn.onclick = () => {
                if (callback) callback();
                hideConfirm();
            };
            document.getElementById("confirm-modal").classList.remove("hidden");
        }

        function hideConfirm() {
            document.getElementById("confirm-modal").classList.add("hidden");
        }

        async function loadInitialData() {
            try {
                const [pcsRes, devicesRes, ownersRes] = await Promise.all([
                    fetch(`${API_BASE}/api/dashboard/pcs`), fetch(`${API_BASE}/api/dashboard/devices`), fetch(`${API_BASE}/api/owners`)
                ]);
                if(pcsRes.ok && devicesRes.ok && ownersRes.ok) {
                    teamOwners = await ownersRes.json();
                    allDevicesCache = await devicesRes.json();
                    renderOwnersList();
                    renderIgnoredList();
                    renderDashboard(await pcsRes.json(), allDevicesCache);
                }
            } catch (err) { console.error("Data pipeline link error:", err); }
        }

        function toggleTeamModal() { document.getElementById("team-modal").classList.toggle("hidden"); }
        function toggleIgnoredModal() { 
            document.getElementById("ignored-modal").classList.toggle("hidden"); 
            renderIgnoredList();
        }

        function renderIgnoredList() {
            const list = document.getElementById("ignored-list");
            const ignored = allDevicesCache.filter(d => d.is_ignored === 1);
            if (ignored.length === 0) {
                list.innerHTML = `<div class="text-center py-4 text-xs text-slate-500 italic">No ignored devices.</div>`;
                return;
            }
            list.innerHTML = ignored.map(d => `
                <div class="flex justify-between items-center bg-slate-800/50 border border-slate-700/50 p-3 rounded-lg">
                    <div class="flex flex-col">
                        <span class="text-sm font-bold text-slate-200">${getEmoji(d.category)} ${d.name || d.id}</span>
                        <span class="text-[10px] text-slate-500 font-mono">${d.id} • Last on: ${d.last_connected_pc}</span>
                    </div>
                    <button onclick="toggleIgnoreDevice('${d.id}')" class="text-emerald-400 hover:text-emerald-300 text-xs font-bold px-3 py-1.5 rounded bg-emerald-500/10 cursor-pointer transition-colors">Restore</button>
                </div>
            `).join('');
        }

        function renderOwnersList() {
            const list = document.getElementById("owners-list");
            list.innerHTML = teamOwners.map(o => `
                <div class="flex justify-between items-center bg-slate-800/50 border border-slate-700/50 p-2.5 rounded-lg">
                    <span class="text-sm font-medium text-slate-200">${o.name}</span>
                    <button onclick="deleteOwner('${o.name}')" class="text-rose-400 hover:text-rose-300 text-xs font-bold px-2 py-1 rounded bg-rose-500/10 cursor-pointer">Delete</button>
                </div>
            `).join('');
        }
        async function addOwner() {
            const name = document.getElementById("new-owner-name").value;
            if(!name) return;
            await fetch(`${API_BASE}/api/owners`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name }) });
            document.getElementById("new-owner-name").value = "";
            loadInitialData();
        }
        async function deleteOwner(name) {
            await fetch(`${API_BASE}/api/owners/${encodeURIComponent(name)}`, { method: 'DELETE' });
            loadInitialData();
        }

        function togglePCEdit(pcId) { editingPCs[pcId] = !editingPCs[pcId]; loadInitialData(); }
        function toggleEdit(deviceId) { editingDevices[deviceId] = !editingDevices[deviceId]; loadInitialData(); }

        async function savePC(pcId) {
            const name = document.getElementById(esc('pc-name', pcId)).value;
            const owner = document.getElementById(esc('pc-owner', pcId)).value;
            await fetch(`${API_BASE}/api/pcs/${encodeURIComponent(pcId)}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name, owner }) });
            editingPCs[pcId] = false;
            loadInitialData();
        }

        async function saveDevice(deviceId) {
            const name = document.getElementById(esc('dev-name', deviceId)).value;
            const owner = document.getElementById(esc('dev-owner', deviceId)).value;
            const category = document.getElementById(esc('dev-cat', deviceId)).value;
            await fetch(`${API_BASE}/api/devices/register`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id: deviceId, name, owner, category }) });
            editingDevices[deviceId] = false;
            loadInitialData();
        }

        async function dismissDevice(deviceId) {
            await fetch(`${API_BASE}/api/devices/${encodeURIComponent(deviceId)}/pending`, { method: 'DELETE' });
            loadInitialData();
        }

        async function setPreferredExe(pcId) {
            await fetch(`${API_BASE}/api/pcs/${pcId}/preferred`, { method: 'POST' });
            loadInitialData();
        }

        async function toggleMonitorPC(pcId) {
            await fetch(`${API_BASE}/api/pcs/${pcId}/toggle_monitor`, { method: 'POST' });
            loadInitialData();
        }

        async function toggleIgnoreDevice(deviceId) {
            await fetch(`${API_BASE}/api/devices/${encodeURIComponent(deviceId)}/toggle_ignore`, { method: 'POST' });
            loadInitialData();
        }

        function confirmDeletePC(pcId) {
            showConfirm(
                "Delete Workstation",
                `Are you sure you want to completely delete workstation ${pcId}? Connected devices will remain but will be hidden.`,
                async () => {
                    await fetch(`${API_BASE}/api/pcs/${encodeURIComponent(pcId)}`, { method: 'DELETE' });
                    loadInitialData();
                }
            );
        }

        function confirmDeleteDevice(deviceId) {
            showConfirm(
                "Delete Device",
                `Are you sure you want to completely delete device ${deviceId}?`,
                async () => {
                    await fetch(`${API_BASE}/api/devices/${encodeURIComponent(deviceId)}`, { method: 'DELETE' });
                    loadInitialData();
                }
            );
        }

        async function lookupDevice(vid, pid, devId) {
            const displayBox = document.getElementById(esc('lookup-res', devId));
            displayBox.classList.remove("hidden");
            displayBox.innerHTML = `Searching server registry...`;
            try {
                const res = await fetch(`${API_BASE}/api/lookup/usb?vid=${vid}&pid=${pid}`);
                const data = await res.json();
                displayBox.innerHTML = `↳ <span class="text-white">${data.vendor}</span> - ${data.device}`;
            } catch (err) {
                displayBox.innerHTML = `↳ Lookup failed.`;
            }
        }

        function renderDashboard(pcs, devices) {
            const container = document.getElementById("pcs-container");
            
            if (pcs.length === 0 && container.innerHTML.trim() === "") {
                container.innerHTML = `<div class="col-span-full text-center p-12 text-slate-500 border border-dashed border-slate-700 rounded-xl">No active client agents detected. Run agent.py on a workstation.</div>`;
                return;
            } else if (pcs.length > 0 && container.innerText.includes("No active client agents")) {
                container.innerHTML = ""; 
            }

            pcs.forEach(pc => {
                const isOnline = (Date.now() / 1000) - pc.last_seen < 15;

                const pcDevices = devices.filter(d => d.last_connected_pc === pc.id && d.is_ignored === 0);
                pcDevices.sort((a, b) => a.is_registered - b.is_registered);

                const exeName = extractExeName(pc.current_exe);
                const hasPreferred = pc.preferred_exe !== null && pc.preferred_exe !== "";
                const isMismatch = hasPreferred && pc.preferred_exe !== pc.current_exe;

                let pcCard = document.getElementById(esc('pc-card', pc.id));
                if (!pcCard) {
                    const newDiv = document.createElement("div");
                    newDiv.id = esc('pc-card', pc.id);
                    newDiv.className = `bg-slate-800/80 border rounded-2xl p-6 shadow-xl flex flex-col justify-between transition-colors`;
                    
                    newDiv.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <div id="${esc('pc-header', pc.id)}" class="w-full mr-4"></div>
                                <div class="flex flex-col items-end gap-2 shrink-0 mt-1">
                                    <span id="${esc('status', pc.id)}" class="flex items-center gap-1.5 text-[10px] font-bold px-2.5 py-1 rounded-md"></span>
                                    <button onclick="toggleMonitorPC('${pc.id}')" id="${esc('monitor-btn', pc.id)}" class="text-[9px] font-extrabold uppercase px-2 py-1 rounded-md cursor-pointer transition-colors shadow-sm"></button>
                                </div>
                            </div>

                            <div id="${esc('window-box', pc.id)}" class="border rounded-xl p-3 mb-6 transition-all duration-300">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-[10px] uppercase font-bold tracking-wider text-slate-500 block">Active Foreground Process</span>
                                    <button onclick="setPreferredExe('${pc.id}')" class="text-[9px] bg-slate-800 hover:bg-emerald-600 border border-slate-700 hover:border-emerald-500 text-white px-2 py-0.5 rounded cursor-pointer transition-colors shadow-sm">
                                        Set as Default
                                    </button>
                                </div>
                                <div class="flex items-center gap-2 mb-1">
                                    <div id="${esc('exe-name', pc.id)}" class="text-sm font-bold text-white truncate"></div>
                                    <div id="${esc('mismatch-badge', pc.id)}" class="hidden text-[9px] bg-rose-500 text-white px-1.5 rounded uppercase font-bold tracking-wide">Mismatch</div>
                                </div>
                                <div id="${esc('exe-path', pc.id)}" class="text-[10px] text-slate-400 font-mono truncate mb-1"></div>
                                
                                <div class="flex items-center justify-between border-t border-slate-700/50 pt-1 mt-1">
                                    <div id="${esc('window-title', pc.id)}" class="text-[11px] text-slate-500 italic truncate w-1/2 pr-2"></div>
                                    <div class="text-[10px] text-slate-400 text-right truncate w-1/2">
                                        Target: <span id="${esc('preferred-exe', pc.id)}" class="font-mono font-bold text-slate-300"></span>
                                    </div>
                                </div>
                            </div>

                            <h4 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3 border-t border-slate-700/50 pt-4 flex items-center justify-between">
                                <span>⛓️ Hardware Inventory (<span id="${esc('hw-count', pc.id)}">0</span>)</span>
                            </h4>
                            <div id="${esc('hw-list', pc.id)}" class="space-y-2.5"></div>
                        </div>
                    `;
                    container.appendChild(newDiv);
                    pcCard = newDiv;
                }

                pcCard.className = `bg-slate-800/80 border ${isOnline ? 'border-slate-700' : 'border-slate-800'} rounded-2xl p-6 shadow-xl flex flex-col justify-between transition-colors`;

                const statusBadge = document.getElementById(esc('status', pc.id));
                statusBadge.className = `flex items-center gap-1.5 text-[10px] font-bold px-2.5 py-1 rounded-md ${isOnline ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-slate-900 text-slate-500'}`;
                statusBadge.innerHTML = `<span class="w-1.5 h-1.5 rounded-full ${isOnline ? 'bg-emerald-400 animate-pulse' : 'bg-slate-500'}"></span>${isOnline ? 'ACTIVE' : 'OFFLINE'}`;

                const monitorBtn = document.getElementById(esc('monitor-btn', pc.id));
                const isMonitoring = pc.is_monitoring === 1;
                monitorBtn.className = `text-[9px] font-extrabold uppercase px-2 py-1 rounded-md cursor-pointer transition-colors shadow-sm ${isMonitoring ? 'bg-amber-500/20 text-amber-400 hover:bg-amber-500/30 border border-amber-500/30' : 'bg-slate-800 text-slate-500 hover:bg-slate-700 border border-slate-700'}`;
                monitorBtn.innerText = isMonitoring ? '🔔 Alerts ON' : '🔕 Alerts OFF';

                document.getElementById(esc('exe-name', pc.id)).innerText = exeName;
                document.getElementById(esc('exe-path', pc.id)).innerText = pc.current_exe || 'Location Unavailable';
                document.getElementById(esc('window-title', pc.id)).innerText = pc.current_window ? `"${pc.current_window}"` : 'No Visual Title';
                document.getElementById(esc('preferred-exe', pc.id)).innerText = hasPreferred ? extractExeName(pc.preferred_exe) : 'Not Set';

                const winBox = document.getElementById(esc('window-box', pc.id));
                const mismatchBadge = document.getElementById(esc('mismatch-badge', pc.id));
                if (isMismatch) {
                    winBox.className = "border-rose-500 bg-rose-950/20 rounded-xl p-3 mb-6 transition-all duration-300 shadow-[0_0_15px_rgba(244,63,94,0.15)]";
                    mismatchBadge.classList.remove("hidden");
                } else {
                    winBox.className = "border-slate-700/30 bg-slate-900/80 rounded-xl p-3 mb-6 transition-all duration-300";
                    mismatchBadge.classList.add("hidden");
                }

                const headerState = JSON.stringify({ pc, editing: editingPCs[pc.id] });
                if (headerStateCache[pc.id] !== headerState) {
                    headerStateCache[pc.id] = headerState;
                    const headerContainer = document.getElementById(esc('pc-header', pc.id));
                    
                    if (editingPCs[pc.id]) {
                        headerContainer.innerHTML = `
                            <div class="flex flex-col gap-2 mt-1 w-full">
                                <input type="text" id="${esc('pc-name', pc.id)}" value="${pc.name || pc.id}" placeholder="PC Name" class="text-sm font-bold bg-slate-950 border border-slate-700 rounded-lg p-2 focus:border-amber-500 focus:outline-none text-white w-full">
                                <div class="flex gap-2">
                                    ${buildOwnerSelect(pc.id, pc.owner, 'pc')}
                                    <button onclick="savePC('${pc.id}')" class="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold px-3 rounded-lg text-xs cursor-pointer transition-colors">Save</button>
                                    <button onclick="confirmDeletePC('${pc.id}')" class="bg-rose-600 hover:bg-rose-700 text-white font-bold px-3 rounded-lg text-xs cursor-pointer transition-colors">Delete</button>
                                    <button onclick="togglePCEdit('${pc.id}')" class="bg-slate-700 hover:bg-slate-600 text-white font-bold px-3 rounded-lg text-xs cursor-pointer transition-colors">✕</button>
                                </div>
                            </div>
                        `;
                    } else {
                        headerContainer.innerHTML = `
                            <div class="group flex items-center gap-2">
                                <h3 class="font-extrabold text-white text-xl tracking-tight">${pc.name || pc.id}</h3>
                                <button onclick="togglePCEdit('${pc.id}')" class="opacity-0 group-hover:opacity-100 text-[10px] bg-slate-700 hover:bg-slate-600 text-white px-2 py-1 rounded cursor-pointer transition-opacity">Edit Host</button>
                            </div>
                            <p class="text-xs text-slate-400 font-mono mt-0.5">ID: ${pc.id} | User: ${pc.owner || 'Unassigned'}</p>
                        `;
                    }
                }

                document.getElementById(esc('hw-count', pc.id)).innerText = pcDevices.length;
                const hwState = JSON.stringify({ pcDevices, editing: editingDevices, owners: teamOwners });
                
                if (hardwareStateCache[pc.id] !== hwState) {
                    hardwareStateCache[pc.id] = hwState; 
                    const hwContainer = document.getElementById(esc('hw-list', pc.id));
                    
                    if (pcDevices.length === 0) {
                        hwContainer.innerHTML = `<div class="text-center py-4 text-xs text-slate-600 border border-dashed border-slate-800 rounded-xl">No hardware logged.</div>`;
                    } else {
                        hwContainer.innerHTML = pcDevices.map(d => {
                            const isConnected = d.is_connected === 1;
                            const isRegistered = d.is_registered === 1;
                            const isEditing = editingDevices[d.id] === true;

                            const borderStyle = !isRegistered ? 'border-amber-500/40 shadow-[0_0_15px_rgba(245,158,11,0.1)]' : (isConnected ? 'border-slate-800' : 'border-rose-900/40');
                            const bgStyle = isConnected ? 'bg-slate-900/40' : 'bg-rose-950/20';
                            const textStyle = isConnected ? 'text-slate-200' : 'text-rose-400';
                            
                            const vpLabels = (d.vid && d.pid)
                                ? `<button onclick="lookupDevice('${d.vid}', '${d.pid}', '${d.id}')" class="text-amber-400 hover:underline cursor-pointer text-left font-mono">VID: ${d.vid} | PID: ${d.pid} 🔍</button>` 
                                : `ID: ${d.id}`;

                            return `
                                <div class="border rounded-xl p-3.5 transition-all ${bgStyle} ${borderStyle} ${textStyle}">
                                    <div class="flex justify-between items-start gap-4">
                                        <div class="space-y-1 min-w-0 flex-1">
                                            <div class="flex items-center gap-2 flex-wrap">
                                                <span class="text-sm">${getEmoji(d.category)}</span>
                                                <span class="font-bold text-sm truncate">${d.name}</span>
                                                ${isConnected ? '' : '<span class="text-[9px] font-extrabold tracking-wider bg-rose-500/20 text-rose-400 px-1.5 py-0.5 rounded uppercase shadow-sm">DISCONNECTED</span>'}
                                                ${!isRegistered ? '<span class="text-[9px] font-extrabold tracking-wider bg-amber-500/20 text-amber-400 px-1.5 py-0.5 rounded uppercase shadow-sm">NEW PENDING</span>' : ''}
                                            </div>
                                            <div class="text-[11px] font-mono opacity-70">
                                                Brand: <b class="text-slate-300 mr-2">${d.manufacturer}</b> • ${vpLabels}
                                                <div id="${esc('lookup-res', d.id)}" class="hidden mt-1 text-emerald-400 font-sans"></div>
                                            </div>
                                        </div>
                                        
                                        <div class="text-right shrink-0 flex flex-col items-end">
                                            ${(isRegistered && !isEditing) ? `
                                                <span class="text-[10px] uppercase font-bold text-slate-500 block">Owner</span>
                                                <span class="text-xs font-bold text-white block">${d.owner || '-'}</span>
                                                <div class="flex gap-2 mt-1">
                                                    <button onclick="toggleEdit('${d.id}')" class="text-[10px] text-slate-400 hover:text-amber-400 underline font-medium cursor-pointer">Edit</button>
                                                    <button onclick="confirmDeleteDevice('${d.id}')" class="text-[10px] text-rose-400 hover:text-rose-300 underline font-medium cursor-pointer">Delete</button>
                                                </div>
                                            ` : ''}
                                            
                                            <div class="flex gap-1 mt-1">
                                                <button onclick="toggleIgnoreDevice('${d.id}')" title="Ignore device & stop alerts" class="text-[10px] bg-slate-800 hover:bg-rose-900/50 hover:text-rose-400 text-slate-400 transition-colors px-1.5 py-0.5 rounded cursor-pointer font-bold">🚫 Ignore</button>
                                                ${!isRegistered ? `
                                                    <button onclick="dismissDevice('${d.id}')" title="Dismiss temporarily" class="text-slate-500 hover:text-rose-400 transition-colors px-1.5 py-0.5 cursor-pointer font-bold bg-slate-800 rounded">✕</button>
                                                    <button onclick="confirmDeleteDevice('${d.id}')" title="Delete device permanently" class="text-rose-400 hover:text-rose-300 transition-colors px-1.5 py-0.5 cursor-pointer font-bold bg-slate-800 rounded">🗑️</button>
                                                ` : ''}
                                            </div>
                                        </div>
                                    </div>

                                    ${(!isRegistered || isEditing) ? `
                                        <div class="mt-3 pt-3 border-t border-slate-800/60 grid grid-cols-1 sm:grid-cols-4 gap-2">
                                            <input type="text" id="${esc('dev-name', d.id)}" value="${d.name || d.manufacturer + ' ' + d.category}" placeholder="Device Label" class="col-span-1 sm:col-span-2 text-xs bg-slate-950 border border-slate-700 rounded-lg p-2 focus:border-amber-500 focus:outline-none text-slate-200">
                                            
                                            <select id="${esc('dev-cat', d.id)}" class="text-xs bg-slate-950 border border-slate-700 rounded-lg p-2 focus:border-amber-500 focus:outline-none text-slate-200">
                                                ${CATEGORIES.map(c => `<option value="${c}" ${d.category === c ? 'selected' : ''}>${getEmoji(c)} ${c}</option>`).join('')}
                                            </select>

                                            ${buildOwnerSelect(d.id, d.owner, 'dev')}

                                            <div class="flex gap-1.5 col-span-1 sm:col-span-4 mt-1">
                                                <button onclick="saveDevice('${d.id}')" class="flex-1 bg-amber-500 hover:bg-amber-600 text-slate-950 font-extrabold text-xs py-2 px-2 rounded-lg transition-colors cursor-pointer">
                                                    ${isEditing ? 'Save Changes' : 'Approve & Track'}
                                                </button>
                                                ${isEditing ? `<button onclick="toggleEdit('${d.id}')" class="bg-slate-700 hover:bg-slate-600 text-white font-extrabold text-xs py-2 px-3 rounded-lg cursor-pointer transition-colors">✕</button>` : ''}
                                            </div>
                                        </div>
                                    ` : ''}
                                </div>
                            `;
                        }).join('');
                    }
                }
            });
            
            const activeCards = new Set(pcs.map(p => esc('pc-card', p.id)));
            Array.from(container.children).forEach(child => {
                if (child.id && child.id.startsWith("pc-card_") && !activeCards.has(child.id)) {
                    child.remove();
                }
            });
        }

        function initializeWebSocket() {
            socket = new WebSocket(WS_URL);
            socket.onopen = () => {
                const badge = document.getElementById("connection-status");
                badge.className = "flex items-center gap-2 bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full text-xs font-medium border border-emerald-500/20";
                badge.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-400"></span> Live Monitoring Active`;
                loadInitialData();
            };
            socket.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (["pc_updated", "window_changed", "hardware_changed"].includes(msg.type)) {
                    loadInitialData();
                }
            };
            socket.onclose = () => {
                const badge = document.getElementById("connection-status");
                badge.className = "flex items-center gap-2 bg-rose-500/10 text-rose-400 px-3 py-1 rounded-full text-xs font-medium border border-rose-500/20";
                badge.innerHTML = `<span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span> Offline - Reconnecting...`;
                setTimeout(initializeWebSocket, 3000);
            };
        }

        window.addEventListener('DOMContentLoaded', () => initializeWebSocket());
    </script>
</body>
</html>
